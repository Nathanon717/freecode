name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm.cmd ci

      - name: Test
        run: npm.cmd test
